<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogram</title>
    <link rel="icon" type="image/x-icon" href="./assets/icons/favicon.png">
    <link href="./style.css" rel="stylesheet">
</head>

<body>
    <header>
        <div>
            <img src="./assets/icons/logo_fotogram.svg" alt="logo_fotogram">
        </div>
    </header>
    <main>
        <h1>Your personal photo album</h1>
        <div class="photo-grid" id="photo-grid"></div>
    </main>
    <footer>
        <div class="footer-content">
            <img src="./assets/icons/logo_DA.svg" alt="logo_developer_akadamie">
            <p>© 2023 Developer Akademie GmbH</p>
        </div>
    </footer>
    <div class="modal" id="modal">
        <div class="modal-box" id="modal-box">
            <div class="modal-headline">
                <h2 id="img-title"></h2>
                <button class="close-modal-button" onclick="closeModal('modal')"></button>
            </div>
            <div class="photo-container" id="photo-container">
                <img src="./assets/imgs/img_1.jpeg" alt="">
            </div>
            <div class="modal-nav" id="modal-nav">
                <button class="prev-img-button" onclick="prevImage()"></button>
                <h3 id="img-index">1/12</h3>
                <button class="next-img-button" onclick="nextImage()"></button>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>

</html>
